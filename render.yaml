databases:
  - name: intellexia-license-db
    plan: free
    databaseName: intellexia_licenses
    user: intellexia

services:
  - type: web
    name: intellexia-license-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intellexia-license-db
          property: connectionString
      - key: LICENSE_PRIVATE_KEY_PEM
